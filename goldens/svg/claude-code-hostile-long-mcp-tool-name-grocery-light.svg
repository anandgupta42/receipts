2" text-anchor="end">1  $0.01</text><line x1="310" y1="170" x2="540" y2="170" stroke="#5A6068" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="0.1 7"/><line x1="32" y1="187" x2="608" y2="187" stroke="#D8DBD6" stroke-width="1.5"/><text x="32" y="210" font-size="14" fill="#1B1E22" text-anchor="start" font-weight="700">TOTAL</text><text x="608" y="210" font-size="14" fill="#1B1E22" text-anchor="end" font-weight="700">$0.01</text><line x1="82" y1="206" x2="558" y2="206" stroke="#5A6068" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="0.1 7"/><text x="32" y="232" font-size="12.5" fill="#5A6068" text-anchor="start" font-weight="400">same tokens on claude-haiku-4-5</text><text x="608" y="232" font-size="12.5" fill="#5A6068" text-anchor="end" font-weight="400">$0.00</text><line x1="272.5" y1="228" x2="562.5" y2="228" stroke="#5A6068" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="0.1 7"/><text x="46" y="248" font-size="10.5" fill="#5A6068" text-anchor="start">(arithmetic, not a prediction)</text><text x="32" y="273" font-size="10.5" fill="#5A6068" text-anchor="start">CARDHOLDER: claude-sonnet-5</text><text x="32" y="300" font-size="10.5" fill="#5A6068" text-anchor="start">Per-turn cost split evenly across that turn's tool calls; unpriced models show tokens only,</text><text x="32" y="315" font-size="10.5" fill="#5A6068" text-anchor="start">never guessed dollars. Full method: aireceipts --methodology</text><g class="stamp" opacity="0.8" transform="rotate(-4 513 342)"><rect x="418" y="331" width="190" height="22" rx="4" fill="none" stroke="#3947C2" stroke-width="2"/><text x="513" y="345.5" font-size="10" fill="#3947C2" text-anchor="middle" font-weight="700" letter-spacing="2">LOCAL · DETERMINISTIC</text></g><text x="320" y="382" font-size="11" fill="#5A6068" text-anchor="middle">THANK YOU FOR VIBING WITH Claude Code</text><text x="320" y="403" font-size="12.5" fill="#1B1E22" text-anchor="middle">|||| || || ||| || |||| ||| ||</text></g></sv