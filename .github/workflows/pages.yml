# SPEC-0021 R2 — deploy site/ to GitHub Pages on every main push.
name: pages
on:
  push:
    branches: [main]
    paths: [site/**, .github/workflows/pages.yml]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/check-landing-css.mjs
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
      - id: d
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: retry once on transient deploy failure
        if: steps.d.outcome == 'failure'
        uses: actions/deploy-pages@v4
