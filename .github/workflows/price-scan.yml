name: Price scan

on:
  schedule:
    - cron: "43 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  tripwire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run advisory price tripwire
        id: tripwire
        shell: bash
        run: |
          set +e
          node scripts/price-tripwire.mjs \
            --report price-tripwire-report.md \
            --summary-json price-tripwire-summary.json \
            > price-tripwire-output.txt 2>&1
          status=$?
          set -e

          cat price-tripwire-output.txt

          if [ "$status" -ne 0 ] && [ "$status" -ne 3 ]; then
            exit "$status"
          fi

          cat price-tripwire-report.md >> "$GITHUB_STEP_SUMMARY"

          drift_count="$(node -e "const s = JSON.parse(require('node:fs').readFileSync('price-tripwire-summary.json', 'utf8')); console.log(s.driftCount)")"
          discovery_count="$(node -e "const s = JSON.parse(require('node:fs').readFileSync('price-tripwire-summary.json', 'utf8')); console.log(s.discoveryCount)")"

          {
            echo "exit_code=$status"
            echo "drift_count=$drift_count"
            echo "discovery_count=$discovery_count"
          } >> "$GITHUB_OUTPUT"

          if [ "$drift_count" -gt 0 ] || [ "$discovery_count" -gt 0 ]; then
            echo "should_open=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_open=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open drift/discovery issue
        if: steps.tripwire.outputs.should_open == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "prices: drift/discovery report" \
            --label "enhancement" \
            --body-file price-tripwire-report.md
