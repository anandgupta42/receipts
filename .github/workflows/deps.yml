name: Deps

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

# SPEC-0033 R2 — least-privilege baseline; the audit job only reads.
permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: audit
        run: npm audit --audit-level=high

      - name: outdated (informational — never fails the job)
        run: npm outdated || true
