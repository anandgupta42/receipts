name: Deps

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

# SPEC-0033 R2 — least-privilege baseline; the audit job only reads.
permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: audit
        run: npm audit --audit-level=high

      - name: outdated (informational — never fails the job)
        run: npm outdated || true
