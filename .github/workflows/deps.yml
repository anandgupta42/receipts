name: Deps

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: audit
        run: npm audit --audit-level=high; echo "audit=$?"

      - name: outdated (informational — never fails the job)
        run: npm outdated || true
