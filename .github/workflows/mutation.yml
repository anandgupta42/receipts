name: Mutation

# Runs Stryker mutation testing on src/pricing/** — the anti-gaming moat
# (AGENTS.md): agent-written tests routinely hit ~100% coverage but only
# ~91% mutation score, so coverage alone doesn't prove the tests assert
# anything real. Gate is placeholder-only until src/pricing/ and a Stryker
# config exist (Tier 0 — harness only, no product code yet).

on:
  pull_request:
    paths:
      - "src/pricing/**"

# SPEC-0033 R2 — least-privilege baseline; this job only reads and runs tests.
permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: mutation score
        run: |
          if [ ! -d src/pricing ] || [ -z "$(ls -A src/pricing 2>/dev/null)" ]; then
            echo "src/pricing/ is empty — nothing to mutate yet (Tier 0 harness). Skipping."
            exit 0
          fi
          if [ ! -f stryker.config.json ] && [ ! -f stryker.conf.json ]; then
            echo "FAIL: src/pricing/ exists but no Stryker config does." >&2
            echo "Pricing code requires mutation testing (AGENTS.md gates) — add a" >&2
            echo "Stryker config in the same PR that introduces src/pricing/." >&2
            exit 1
          fi
          npx stryker run
        # TODO(M1+): extend to score-not-decreased vs. the baseline on main.
