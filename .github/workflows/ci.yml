name: CI

on:
  push:
    branches: [main]
  pull_request:

# SPEC-0033 R2 — least-privilege baseline; no job here needs more than read.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 20 is EOL; CI runs a single supported version. `engines` still
        # allows >=20, and the one path the dropped Node 20 job used to cover —
        # the sqlite3-CLI fallback, exercised only when node:sqlite is absent —
        # now has direct coverage in test/parse/sqlite.test.ts (forced-CLI +
        # node:sqlite parity), so a single Node version loses no coverage.
        node-version: [22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: lint
        run: npx eslint . --max-warnings 0

      - name: test
        run: npx vitest run

      - name: goldens
        run: node scripts/verify-goldens.mjs

      - name: determinism
        run: node scripts/determinism-check.mjs --runs=10 -- node scripts/verify-goldens.mjs

      - name: spec-lint
        run: node scripts/spec-lint.mjs

      - name: hygiene
        run: node scripts/hygiene.mjs

  preflight:
    # The consolidated pre-release gate, --quick (skips the heavy re-runs other
    # jobs already do). Its unique coverage: the publish-shape manifest (name,
    # bin, exact files allowlist, no prepack/prepare) and tarball leanness
    # (no sourcemaps, size/count) — caught on every PR, not just at release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.14"
      - run: npm ci
      - run: npm run preflight -- --quick

  prices:
    # Mechanical enforcement of I2/I3: any PR touching data/prices/** must pass
    # cite-check (schema + non-empty cited sources). The Claude Code hook is UX;
    # this job is the source of truth.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: detect price changes
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only "$base"...HEAD -- 'data/prices/*.json' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: cite-check
        if: steps.changed.outputs.files != ''
        run: node --experimental-strip-types scripts/cite-check.ts ${{ steps.changed.outputs.files }}

  cli-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: built CLI and packed tarball
        run: npx vitest run test/cli-e2e
