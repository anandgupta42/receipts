name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm install

      - name: typecheck
        run: npx tsc --noEmit; echo "tsc=$?"

      - name: lint
        run: npx eslint . --max-warnings 0; echo "eslint=$?"

      - name: test
        run: npx vitest run; echo "vitest=$?"

      - name: goldens
        run: node scripts/verify-goldens.mjs; echo "goldens=$?"
